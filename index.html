<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mummy 💕</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff9ecb,#ff4d88);
  color:white;
  text-align:center;
  overflow:hidden;
}

.page{display:none;min-height:100vh;justify-content:center;align-items:center;flex-direction:column;}
.active{display:flex;}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d88;
  font-weight:bold;
  margin-top:20px;
}

/* typing */
.typing{max-width:300px;font-size:20px;}

/* hearts FAST */
.heart{
  position:fixed;
  top:-10px;
  animation:fall 3s linear infinite;
}
@keyframes fall{to{transform:translateY(110vh);}}

/* balloons FAST */
.balloon{
  position:fixed;
  bottom:-50px;
  animation:rise 4s linear infinite;
}
@keyframes rise{to{transform:translateY(-120vh);}}

/* music btn */
#musicBtn{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  color:#ff4d88;
  border-radius:50%;
  padding:10px;
  z-index:999;
}

/* cake */
#cake{font-size:90px;position:relative;}
#knife{
  position:absolute;
  font-size:40px;
  top:-40px;
  left:-80px;
  transition:1s;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" src="your-music.mp3" loop></audio>
<button id="musicBtn" onclick="toggleMusic()">🎶</button>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1 id="t1"></h1>
  <p id="s1"></p>
  <button onclick="start()">Enter 🎀</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <h2 id="t2"></h2>

  <div id="cake">
    🎂
    <div id="knife">🔪</div>
  </div>

  <button onclick="cutCake()">Cut Cake 🔪</button>
  <p id="cakeMsg"></p>

  <button onclick="next(3)">Next 💕</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <h2 id="t3"></h2>
  <p class="typing" id="msg"></p>
  <button onclick="next(4)">Next 🎥</button>
</div>

<!-- PAGE 4 (VIDEO) -->
<div class="page" id="p4">
  <h2>🎬 Memories</h2>
  <video width="90%" controls>
    <source src="your-video.mp4">
  </video>
  <button onclick="next(5)">Final 💕</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="p5">
  <h1 id="t5"></h1>
  <p class="typing" id="finalMsg"></p>
</div>

<script>

/* typing */
function type(text,id,speed){
  let i=0;
  let el=document.getElementById(id);
  el.innerHTML="";
  function t(){
    if(i<text.length){
      el.innerHTML+= text.charAt(i)=="\n"?"<br>":text.charAt(i);
      i++;
      setTimeout(t,speed);
    }
  }
  t();
}

/* navigation */
function next(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');

  if(n==2) type("Cake Ceremony 🎂","t2",40);
  if(n==3){
    type("For You 💌","t3",40);
    type("Mummy ji aap meri life ho 💖\n\nAap meri strength ho 💕\n\nLove you always ❤️","msg",35);
  }
  if(n==5){
    type("I Love You Mummy 💕","t5",40);
    type("Forever ❤️","finalMsg",35);
  }
}

/* start */
function start(){
  next(2);
  document.getElementById("music").play().catch(()=>{});
}

/* intro */
type("Happy Birthday Mummy Ji 💕","t1",40);
setTimeout(()=>type("Sabse pyari mummy 💖","s1",30),2000);

/* cake cut */
function cutCake(){
  let knife=document.getElementById("knife");
  knife.style.left="40px";
  knife.style.top="20px";

  setTimeout(()=>{
    document.getElementById("cake").innerHTML="🍰";
    document.getElementById("cakeMsg").innerHTML="🎉 Cake Cut! Happy Birthday 💕";
  },1000);
}

/* music */
function toggleMusic(){
  let m=document.getElementById("music");
  m.paused?m.play():m.pause();
}

/* hearts FAST */
setInterval(()=>{
  let h=document.createElement("div");
  h.innerHTML="💗";
  h.className="heart";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),3000);
},200);

/* balloons FAST */
setInterval(()=>{
  let b=document.createElement("div");
  b.innerHTML="🎈";
  b.className="balloon";
  b.style.left=Math.random()*100+"vw";
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),4000);
},500);

</script>

</body>
</html>
